<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d2044">
<title>FALCON PHARMA IMPEX</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --primary:#0d2044;--primary2:#1a3a72;--primary3:#2557a7;
  --accent:#e8340a;--gold:#f4c542;
  --ok:#0f6e56;--warn:#b56f00;--danger:#c0260a;
  --bg:#f2f4f9;--card:#fff;--border:#dde3ef;
  --text:#1a2340;--muted:#6b7a99;
  --r:12px;--sh:0 2px 14px rgba(14,34,72,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
.hide{display:none!important}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0b1d3a 0%,#0f2550 35%,#163a7a 70%,#1e4596 100%);
  padding:20px;
}
.login-card{
  background:#fff;border-radius:20px;padding:44px 36px 36px;
  width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  text-align:center;
}
.login-company{
  font-size:22px;font-weight:800;color:#0d2044;
  letter-spacing:.5px;line-height:1.25;margin-bottom:7px;
}
.login-tagline{
  font-size:11.5px;color:#8898b8;
  letter-spacing:.3px;font-style:italic;margin-bottom:34px;
}
.login-lbl{
  display:block;text-align:left;
  font-size:11px;font-weight:700;color:#8898aa;
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px;
}
.login-inp{
  width:100%;padding:13px 16px;
  border:1.5px solid #dde3ef;border-radius:10px;
  font-size:15px;color:#1a2340;background:#f7f9fc;
  outline:none;font-family:inherit;transition:.15s;
  margin-bottom:18px;
}
.login-inp:focus{border-color:#2557a7;background:#fff;box-shadow:0 0 0 3px rgba(37,87,167,.12)}
.login-btn{
  width:100%;padding:14px;border:none;border-radius:11px;
  background:#2557a7;color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.4px;font-family:inherit;transition:.15s;margin-top:4px;
}
.login-btn:hover{background:#1e4080}

/* ── HEADER ── */
.hdr{
  background:var(--primary);color:#fff;
  padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.hdr-brand{font-size:13px;font-weight:800;letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-user{font-size:12px;opacity:.85;text-align:right;line-height:1.3}
.hdr-user b{display:block;font-size:13px}
.hdr-btn{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:6px 13px;
  font-size:12px;cursor:pointer;color:#fff;font-family:inherit;
}

/* ── NAV ── */
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:76px;padding:11px 6px;text-align:center;font-size:11.5px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;user-select:none;transition:.15s}
.nav-tab.active{color:var(--primary3);border-bottom-color:var(--primary3)}

/* ── SAHIFALAR ── */
.page{display:none;padding:14px 14px 90px;max-width:760px;margin:0 auto}
.page.active{display:block}

/* ── KARTALAR ── */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.card-h{background:var(--primary);color:#fff;padding:13px 18px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.card-b{padding:17px}

/* ── FORMA ── */
.fg{margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
label .req{color:var(--accent)}
input,select,textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:#f8fafd;outline:none;appearance:none;font-family:inherit;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary3);background:#fff;box-shadow:0 0 0 3px rgba(37,87,167,.1)}
textarea{resize:vertical;min-height:76px}
.search-wrap{position:relative}
.search-wrap input{padding-left:36px}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ── RADIO ── */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.ropt{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;background:#f8fafd;user-select:none;transition:.15s}
.ropt:hover{border-color:var(--primary3);background:#eef2fb}
.ropt.on{border-color:var(--primary3);background:#dce8f7;color:var(--primary);font-weight:700}

/* ── TUGMALAR ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-p{background:var(--primary3);color:#fff}
.btn-p:hover{background:var(--primary2)}
.btn-ok{background:var(--ok);color:#fff}
.btn-ok:hover{background:#0a5040}
.btn-o{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-o:hover{border-color:var(--primary3);color:var(--primary3)}
.btn-r{background:var(--accent);color:#fff}
.btn-purple{background:#7a3ca0;color:#fff}
.btn-bl{width:100%}
.btn-lg{padding:14px 28px;font-size:15px;border-radius:11px}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── BADJ ── */
.bdg{display:inline-block;padding:3px 10px;border-radius:11px;font-size:11px;font-weight:700}
.bdg-b{background:#dce8f7;color:var(--primary)}
.bdg-g{background:#d4f5e8;color:var(--ok)}
.bdg-r{background:#fde0dc;color:var(--danger)}
.bdg-y{background:#fff3cd;color:var(--warn)}
.bdg-p{background:#ede8fc;color:#4a35a0}

/* ── XABARLAR (alert) ── */
.alert{padding:11px 15px;border-radius:9px;font-size:13px;margin-bottom:13px;display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.alert-i{background:#eef2fb;border:1px solid #c5d4ef;color:var(--primary)}
.alert-w{background:#fff8e6;border:1px solid #f5d87a;color:var(--warn)}
.alert-ok{background:#edfaf4;border:1px solid #9fe1c9;color:var(--ok)}
.alert-r{background:#fde0dc;border:1px solid #f5b8ae;color:var(--danger)}

/* ── QIDIRUV RO'YXATI ── */
.slist{border:1.5px solid var(--border);border-radius:9px;max-height:230px;overflow-y:auto;background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.1);position:relative;z-index:50;margin-top:2px}
.sitem{padding:11px 14px;cursor:pointer;font-size:13.5px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.sitem:last-child{border-bottom:none}
.sitem:hover{background:#eef2fb}
.sitem-name{font-weight:700}
.sitem-meta{font-size:11.5px;color:var(--muted)}

/* ── TAYMER ── */
.timer-box{background:linear-gradient(135deg,var(--primary) 0%,var(--primary3) 100%);color:#fff;border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.timer-val{font-size:30px;font-weight:800;font-family:'Courier New',monospace;letter-spacing:1px}
.timer-warn{color:#ffb3a8;font-size:11px;margin-top:3px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:#fff;border-radius:var(--r);padding:16px;border:1px solid var(--border);text-align:center}
.kpi-num{font-size:30px;font-weight:800;color:var(--primary3)}
.kpi-num.danger{color:var(--danger)}
.kpi-lbl{font-size:10.5px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

/* ── JADVAL ── */
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl thead th{background:#f2f4f9;padding:7px 5px;text-align:left;font-weight:700;border-bottom:1.5px solid var(--border);font-size:10px}
.stbl td{padding:5px;border-bottom:1px solid var(--border);vertical-align:middle}
.stbl td input{width:58px;text-align:center;padding:4px 6px;font-size:12px}
.stbl .sum-cell{color:var(--ok);font-weight:600;font-size:11px}

/* ── INFO QATORLAR ── */
.irow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.irow-l{color:var(--muted)}
.irow-v{font-weight:700;text-align:right;max-width:60%;word-break:break-word}

/* ── FOTO ── */
.foto-box{border:2.5px dashed var(--border);border-radius:11px;min-height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);cursor:pointer;background:#f8fafd;overflow:hidden;transition:.15s}
.foto-box:hover{border-color:var(--primary3)}
.foto-box img{width:100%;height:auto;display:block}

/* ── VIZIT KARTA ── */
.vcard{border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px;background:#fff}
.vcard-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.vcard-name{font-weight:700;font-size:14px}
.vcard-meta{font-size:12px;color:var(--muted);line-height:1.6}

/* ── YANGI OB'EKT ── */
.new-form{background:#fffbf0;border:1.5px solid #f5d87a;border-radius:10px;padding:15px;margin-top:10px}

/* ── QADAM PANELI ── */
.steps-bar{display:flex;align-items:center;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.step-chip{padding:5px 11px;border-radius:13px;font-size:11px;font-weight:700;white-space:nowrap;background:#eceef3;color:var(--muted)}
.step-chip.active{background:var(--primary3);color:#fff}
.step-chip.done{background:var(--ok);color:#fff}
.step-arrow{color:var(--border);font-size:12px;flex-shrink:0}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(8,21,48,.6);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.ov-box{background:#fff;border-radius:18px;padding:34px 44px;text-align:center;min-width:220px}
.spinner{width:38px;height:38px;border:3.5px solid var(--border);border-top-color:var(--primary3);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-bottom:13px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(8,21,48,.55);display:flex;align-items:center;justify-content:center;z-index:998;padding:20px}
.modal-box{background:#fff;border-radius:16px;padding:26px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:10px;color:var(--primary)}

/* ── MUVAFFAQIYAT ── */
.success-scr{text-align:center;padding:30px 16px}
.success-icon{font-size:58px;margin-bottom:14px}
.success-title{font-size:23px;font-weight:800;color:var(--ok);margin-bottom:8px}
.success-sub{color:var(--muted);font-size:14px;margin-bottom:16px}

/* ── OFLAYN BAR ── */
.offline-bar{background:var(--accent);color:#fff;text-align:center;padding:7px;font-size:12px;font-weight:600;display:none;position:sticky;top:0;z-index:400}

/* ── BALANS (Menejer) ── */
.balance-box{background:linear-gradient(135deg,#7a3ca0,#9b59d8);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:14px;text-align:center}
.balance-num{font-size:32px;font-weight:800}
.balance-lbl{font-size:11px;opacity:.85;text-transform:uppercase;margin-top:4px;letter-spacing:.4px}

/* ── XARITA ── */
#map-canvas{width:100%;height:480px;border-radius:var(--r);border:1px solid var(--border)}

/* ── RESPONSIV ── */
@media(max-width:480px){
  .frow,.frow3{grid-template-columns:1fr}
  .rg,.rg3{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .card-b{padding:13px}
  #map-canvas{height:360px}
  .login-card{padding:32px 22px 28px}
  .login-company{font-size:20px}
}
</style>
</head>
<body>

<!-- OFLAYN BAR -->
<div class="offline-bar" id="offline-bar">📵 Internet yo'q — ma'lumotlar saqlanmoqda</div>

<!-- LOGIN SAHIFASI -->
<div id="pg-login" class="login-wrap">
  <div class="login-card">
    <div class="login-company">FALCON PHARMA IMPEX</div>
    <div class="login-tagline">Effective and Innovative Solutions for Health</div>

    <div>
      <label class="login-lbl">Login</label>
      <input class="login-inp" id="l-id" type="text" placeholder="ID"
             autocomplete="username" />
    </div>
    <div>
      <label class="login-lbl">Parol</label>
      <input class="login-inp" id="l-pass" type="password" placeholder="••••••••"
             autocomplete="current-password" />
    </div>

    <div id="l-err" class="alert alert-r hide">Login yoki parol noto'g'ri</div>

    <button class="login-btn" onclick="doLogin()">KIRISH</button>
  </div>
</div>

<!-- ASOSIY ILOVA -->
<div id="app" class="hide">
  <header class="hdr">
    <div class="hdr-brand">FALCON PHARMA IMPEX</div>
    <div class="hdr-right">
      <div class="hdr-user"><b id="hdr-name">—</b><span id="hdr-role">—</span></div>
      <button class="hdr-btn" onclick="logout()">Chiqish</button>
    </div>
  </header>
  <nav class="nav" id="main-nav"></nav>
  <div id="pages-container"></div>
</div>

<!-- OVERLAY -->
<div class="overlay hide" id="overlay">
  <div class="ov-box">
    <div class="spinner"></div>
    <div id="ov-msg" style="font-size:14px;color:var(--muted)">Yuklanmoqda...</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg hide" id="modal-bg">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- JS FAYLLAR -->
<script src="app.js"></script>
<script src="app2.js"></script>
<script src="app3.js"></script>
<script src="app4.js"></script>
<script src="app5.js"></script>
<script src="app4_manager.js"></script>
<script src="app5_map.js"></script>

</body>
</html>
